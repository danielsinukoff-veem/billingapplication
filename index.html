<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Partner Billing Workbook</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='18' fill='%230f5a52'/%3E%3Cpath d='M19 20h26v6H19zm0 10h18v6H19zm0 10h26v6H19z' fill='%23fff9f0'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app"></div>
    <script>
      (async () => {
        const isLocalRuntime = ["localhost", "127.0.0.1"].includes(window.location.hostname) || window.location.protocol === "file:";
        const loadScript = (src, { type = "text/javascript", optional = false } = {}) => new Promise((resolve, reject) => {
          const script = document.createElement("script");
          script.src = src;
          if (type === "module") script.type = "module";
          script.onload = () => resolve();
          script.onerror = () => {
            if (optional) {
              resolve();
              return;
            }
            reject(new Error(`Could not load ${src}`));
          };
          document.body.appendChild(script);
        });
        try {
          await loadScript("./app-config-20260424-fixes1.js");
          if (isLocalRuntime) {
            await loadScript("./app-config.local.js", { optional: true });
            await loadScript("./aws-credentials.local.js", { optional: true });
          }
          await loadScript("./app-20260424-fixes1.js", { type: "module" });
        } catch (error) {
          console.error("Billing app bootstrap failed", error);
        }
      })();
    </script>
  </body>
</html>
