<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Partner Billing Workbook</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='18' fill='%231c3969'/%3E%3Cpath d='M19 20h26v6H19zm0 10h18v6H19zm0 10h26v6H19z' fill='%23007fe0'/%3E%3Ccircle cx='48' cy='16' r='5' fill='%23ff8200'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app"></div>
    <script>
      (async () => {
        const isLocalRuntime = ["localhost", "127.0.0.1"].includes(window.location.hostname) || window.location.protocol === "file:";
        const loadScript = (src, { type = "text/javascript", optional = false } = {}) => new Promise((resolve, reject) => {
          const script = document.createElement("script");
          script.src = src;
          if (type === "module") script.type = "module";
          script.onload = () => resolve();
          script.onerror = () => {
            if (optional) {
              resolve();
              return;
            }
            reject(new Error(`Could not load ${src}`));
          };
          document.body.appendChild(script);
        });
        try {
          await loadScript("./app-config.js");
          if (isLocalRuntime) {
            await loadScript("./app-config.local.js", { optional: true });
            await loadScript("./aws-credentials.local.js", { optional: true });
          }
          // Runtime-injected config (e.g. the bearer token rotated into SSM and
          // written to S3 by the Veem Billing FE deploy workflow). Safe to
          // request unconditionally -- 404s are swallowed because optional:true.
          await loadScript("./app-config-runtime.js", { optional: true });
          await loadScript("./app.js", { type: "module" });
        } catch (error) {
          console.error("Billing app bootstrap failed", error);
          const root = document.getElementById("app");
          if (root) {
            root.innerHTML = `
              <main style="max-width:720px;margin:72px auto;padding:32px;border:1px solid #d8dee8;border-radius:18px;background:#fff8ef;color:#17233c;font-family:Arial,sans-serif">
                <h1 style="margin-top:0">Billing app failed to load</h1>
                <p>The browser could not load one of the required app scripts. Hard refresh the page first. If it continues, check that <code>app-config.js</code>, <code>app-config-runtime.js</code>, and <code>app.js</code> are available on the hosted site.</p>
                <p style="font-size:13px;opacity:.75">${String(error && error.message ? error.message : error).replaceAll("<", "&lt;")}</p>
              </main>
            `;
          }
        }
      })();
    </script>
  </body>
</html>
